name: e-tutoring-prod

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        APP_DIR: backend
    depends_on:
      - php
    ports:
      - "8000:80"
    volumes:
      - app_storage:/var/www/storage:ro
    networks:
      - app
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
      args:
        APP_DIR: backend
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend/.env.prod:/var/www/.env:ro
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    networks:
      - app
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: e_tutoring
      MYSQL_USER: laravel
      MYSQL_PASSWORD: prod_laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./backend/mysql_data:/var/lib/mysql
    networks:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_prod:/data
    networks:
      - app
    restart: unless-stopped

  adminer:
    image: adminer:4
    depends_on:
      - mysql
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  redis_data_prod:
  app_storage:
  app_bootstrap_cache:
