name: e-tutoring-prod

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        APP_DIR: backend
        FRONTEND_DIR: frontend
        NGINX_CONF: prod.conf
        VITE_API_BASE_URL: /api
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME}
    depends_on:
      - php
      - reverb
      - adminer
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - app_storage:/var/www/storage:ro
    networks:
      - app
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
      args:
        APP_DIR: backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    environment:
      APP_RUN_MIGRATIONS: "1"
      APP_MIGRATION_MAX_ATTEMPTS: "30"
      APP_MIGRATION_RETRY_DELAY: "2"
    volumes:
      - ./backend/.env:/var/www/.env:ro
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    networks:
      - app
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
      args:
        APP_DIR: backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/.env:/var/www/.env:ro
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    command: ["php", "artisan", "schedule:work"]
    networks:
      - app
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
      args:
        APP_DIR: backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started
    volumes:
      - ./backend/.env:/var/www/.env:ro
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=1", "--timeout=60"]
    networks:
      - app
    restart: unless-stopped

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
      args:
        APP_DIR: backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/.env:/var/www/.env:ro
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    expose:
      - "8080"
    networks:
      - app
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - ./backend/mysql_data:/var/lib/mysql
    networks:
      - app
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_prod:/data
    networks:
      - app
    restart: unless-stopped

  adminer:
    image: adminer:4
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog
    ports:
      - "127.0.0.1:8025:8025"
    expose:
      - "1025"
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  redis_data_prod:
  app_storage:
  app_bootstrap_cache:
