name: laravel-starter-kit-local

services:
  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - php
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend:/var/www
    networks:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - mysql
      - redis
    volumes:
      - ./backend:/var/www
    networks:
      - app

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: laravel_starter_kit
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data_local:/var/lib/mysql
    networks:
      - app

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_local:/data
    networks:
      - app

  adminer:
    image: adminer:4
    depends_on:
      - mysql
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data_local:
  redis_data_local:
