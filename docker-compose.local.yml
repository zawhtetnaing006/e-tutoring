name: e-tutoring-local

services:
  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - frontend
      - php
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-lc", "npm ci && npm run dev -- --host 0.0.0.0 --port 3000"]
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - php
    networks:
      - app

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    depends_on:
      - mysql
      - redis
      - mailhog
    volumes:
      - ./backend:/var/www
      - ./backend/.env.local:/var/www/.env:ro
    networks:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - mysql
      - redis
      - mailhog
    volumes:
      - ./backend:/var/www
      - ./backend/.env.local:/var/www/.env:ro
    networks:
      - app

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: e_tutoring
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data_local:/var/lib/mysql
    networks:
      - app

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data_local:/data
    networks:
      - app

  adminer:
    image: adminer:4
    depends_on:
      - mysql
    networks:
      - app

  mailhog:
    image: mailhog/mailhog
    platform: linux/amd64
    ports:
      - "8025:8025"
    expose:
      - "1025"
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data_local:
  redis_data_local:
